services:
  # Backend API (Node.js)
  - type: web
    name: gitb-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: gitb_lms
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: noreply@gitb.lt
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: APPLICATION_FEE_EUR
        value: "50.00"
      - key: DEFAULT_CURRENCY
        value: EUR
      - key: FRONTEND_URL
        value: https://gitb.lt
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /api

  # Frontend (Static Site)
  - type: web
    name: gitb-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://new-school-vam1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
